<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <th:block th:fragment="subject" th:text="#{professorInvitation.subject(${tenantName})}"></th:block>
</head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;padding:20px">
  <div style="max-width:600px;margin:0 auto;background:white;padding:30px;border-radius:8px">
    <h2 th:text="${tenantName}" style="color:#2563eb">League</h2>
    <p><span th:text="#{professorInvitation.hi}">Hi</span> <strong th:text="${professorName}">Professor</strong>,</p>
    <p th:text="#{professorInvitation.body(${tenantName})}"></p>
    <p style="margin:24px 0">
      <a th:href="${activationUrl}"
         style="background:#2563eb;color:white;padding:12px 24px;text-decoration:none;border-radius:6px;display:inline-block"
         th:text="#{professorInvitation.cta}">Accept Invitation</a>
    </p>
    <p style="color:#6b7280;font-size:14px" th:text="#{professorInvitation.expiry(${expiresAt})}"></p>
    <hr style="margin:24px 0;border:none;border-top:1px solid #e5e7eb">
    <p th:text="#{layout.footer(${tenantName})}" style="color:#9ca3af;font-size:12px"></p>
  </div>
</body>
</html>
