<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <th:block th:fragment="subject" th:text="|Set up your account at ${tenantName}|"></th:block>
</head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;padding:20px">
  <div style="max-width:600px;margin:0 auto;background:white;padding:30px;border-radius:8px">
    <h2 th:text="${tenantName}" style="color:#2563eb">Klasio</h2>
    <p>Hi <strong th:text="${recipientName}">User</strong>,</p>
    <p>Your <span th:text="${role}">account</span> account on <span th:text="${tenantName}"></span> is ready. Click the button below to create your password and access Klasio.</p>
    <p style="margin:24px 0">
      <a th:href="${setupUrl}"
         style="background:#2563eb;color:white;padding:12px 24px;text-decoration:none;border-radius:6px;display:inline-block">
        Set Up My Account
      </a>
    </p>
    <p style="color:#ef4444;font-size:14px">This link expires at <span th:text="${expiresAt}"></span>. If it expires, use the "Resend link" option on the login page.</p>
    <hr style="margin:24px 0;border:none;border-top:1px solid #e5e7eb">
    <p style="color:#9ca3af;font-size:12px">Sent by <span th:text="${tenantName}"></span> via Klasio.</p>
  </div>
</body>
</html>
