openapi: 3.0.3
info:
  title: Klasio Professor Management API
  description: REST API for managing professors within a tenant
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: Professors
    description: Professor CRUD operations

paths:
  /professors:
    get:
      operationId: listProfessors
      tags: [Professors]
      summary: List all professors for the current tenant
      description: Returns a paginated list of professors. Filterable by status.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [INVITED, ACTIVE, DEACTIVATED]
      responses:
        '200':
          description: Paginated list of professors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfessorListResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — insufficient role

    post:
      operationId: createProfessor
      tags: [Professors]
      summary: Create a new professor
      description: Creates a professor profile and generates an invitation token. Only ADMIN, SUPERADMIN, or MANAGER roles.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfessorRequest'
      responses:
        '201':
          description: Professor created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfessorDetailResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists in this tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /professors/{professorId}:
    get:
      operationId: getProfessorDetail
      tags: [Professors]
      summary: Get professor details
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProfessorIdParam'
      responses:
        '200':
          description: Professor details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfessorDetailResponse'
        '404':
          description: Professor not found

    put:
      operationId: updateProfessor
      tags: [Professors]
      summary: Update professor profile
      description: Updates the professor's name and/or email. Only ADMIN, SUPERADMIN, or MANAGER roles.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProfessorIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfessorRequest'
      responses:
        '200':
          description: Professor updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfessorDetailResponse'
        '400':
          description: Validation error
        '404':
          description: Professor not found
        '409':
          description: Email already exists in this tenant

  /professors/{professorId}/deactivate:
    post:
      operationId: deactivateProfessor
      tags: [Professors]
      summary: Deactivate a professor
      description: Sets professor status to DEACTIVATED. Only ADMIN, SUPERADMIN, or MANAGER roles.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProfessorIdParam'
      responses:
        '200':
          description: Professor deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfessorDetailResponse'
        '404':
          description: Professor not found
        '409':
          description: Professor is already deactivated

  /professors/{professorId}/reactivate:
    post:
      operationId: reactivateProfessor
      tags: [Professors]
      summary: Reactivate a professor
      description: Sets professor status back to ACTIVE. Only ADMIN, SUPERADMIN, or MANAGER roles.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProfessorIdParam'
      responses:
        '200':
          description: Professor reactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfessorDetailResponse'
        '404':
          description: Professor not found
        '409':
          description: Professor is already active or invited

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProfessorIdParam:
      name: professorId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0

    SizeParam:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  schemas:
    CreateProfessorRequest:
      type: object
      required: [firstName, lastName, email]
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          example: Carlos
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          example: Martinez
        email:
          type: string
          format: email
          maxLength: 255
          example: carlos.martinez@example.com

    UpdateProfessorRequest:
      type: object
      required: [firstName, lastName, email]
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 255

    ProfessorDetailResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [INVITED, ACTIVE, DEACTIVATED]
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid
        updatedAt:
          type: string
          format: date-time
          nullable: true
        updatedBy:
          type: string
          format: uuid
          nullable: true

    ProfessorSummaryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [INVITED, ACTIVE, DEACTIVATED]
        createdAt:
          type: string
          format: date-time

    ProfessorListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ProfessorSummaryResponse'
        number:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
