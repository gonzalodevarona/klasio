spring:
  config:
    # Auto-imports gitignored R2 credentials when present.
    # Optional: app still starts (with empty creds) if file is missing.
    import: optional:classpath:application-local-secrets.yml
  datasource:
    url: jdbc:postgresql://localhost:5432/klasio
    username: klasio_app
    password: klasio_pass
  jpa:
    show-sql: true
klasio:
  email:
    transport: logging
  scheduler:
    delegation-reminder:
      enabled: false   # disable during local dev to avoid log noise
  jwt:
    secret: local-dev-secret-key-that-is-at-least-256-bits-long-for-hs256-signing
    access-token-expiration: 28800000
    refresh-token-expiration: 604800000
  auth:
    email-verification-expiry-hours: 24
    password-reset-expiry-minutes: 30
    max-failed-login-attempts: 5
    lockout-duration-minutes: 15
    from-email: noreply@klasio.local
  # s3.* values come from gitignored application-local-secrets.yml.
  # If you want LocalStack instead, set those values in that file.

logging:
  level:
    com.klasio: DEBUG
    org.hibernate.SQL: DEBUG
