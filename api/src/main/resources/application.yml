spring:
  application:
    name: klasio-api

  datasource:
    hikari:
      connection-init-sql: "SELECT set_config('app.current_tenant', '00000000-0000-0000-0000-000000000000', false)"

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

logging:
  pattern:
    console: "%d{ISO8601} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n"

klasio:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:28800000}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  auth:
    email-verification-expiry-hours: ${AUTH_EMAIL_VERIFICATION_EXPIRY_HOURS:24}
    password-reset-expiry-minutes: ${AUTH_PASSWORD_RESET_EXPIRY_MINUTES:30}
    max-failed-login-attempts: ${AUTH_MAX_FAILED_LOGIN_ATTEMPTS:5}
    lockout-duration-minutes: ${AUTH_LOCKOUT_DURATION_MINUTES:15}
    from-email: ${AUTH_FROM_EMAIL:noreply@klasio.app}
  frontend:
    url-template: ${KLASIO_FRONTEND_URL_TEMPLATE:http://localhost:3000}
  email:
    transport: ${KLASIO_EMAIL_TRANSPORT:logging}
    from:
      address: ${KLASIO_EMAIL_FROM_ADDRESS:noreply@klasio.app}
      name-suffix: " via Klasio"
    retry:
      max-attempts: 3
      initial-delay-ms: 1000
      multiplier: 5
      max-delay-ms: 30000
    brevo:
      api-key: ${BREVO_API_KEY:}
      api-base-url: https://api.brevo.com/v3
  s3:
    bucket: ${AWS_S3_BUCKET:klasio-logos-dev}
    region: ${AWS_REGION:us-east-1}

management:
  endpoints:
    web:
      exposure:
        include: health,info
