spring:
  application:
    name: klasio-api

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

logging:
  pattern:
    console: "%d{ISO8601} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n"

klasio:
  jwt:
    secret: ${JWT_SECRET:}
    expiration: 86400000
  s3:
    bucket: ${AWS_S3_BUCKET:klasio-logos-dev}
    region: ${AWS_REGION:us-east-1}

management:
  endpoints:
    web:
      exposure:
        include: health,info
