services:
  postgres:
    image: postgres:17
    container_name: klasio-postgres
    environment:
      POSTGRES_DB: klasio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d klasio"]
      interval: 5s
      timeout: 3s
      retries: 5

  localstack:
    image: localstack/localstack:4
    container_name: klasio-localstack
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh
    healthcheck:
      test: ["CMD", "awslocal", "s3", "ls"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  localstack_data:
