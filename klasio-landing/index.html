<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klasio — Sports club management software</title>
  <meta name="description" content="All-in-one platform to manage memberships, attendance, payments and programs for your sports club. No spreadsheets, no chaos.">
  <link rel="canonical" href="https://klasio.club">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://klasio.club">
  <meta property="og:title" content="Klasio — Sports club management software">
  <meta property="og:description" content="The professional way to run your sports club.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=DM+Mono:wght@400;500&display=swap">

  <style>
    :root {
      --volt: #CAFF4D;
      --volt-dark: #2A4A00;
      --dark: #0A0A0A;
      --surface: #111111;
      --surface2: #181818;
      --border: #1E1E1E;
      --border2: #2A2A2A;
      --muted: #4A4A48;
      --subtle: #6A6A68;
      --text: #FAFAF8;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      line-height: 1.5;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }
    img, svg { display: block; max-width: 100%; }
    h1, h2, h3, p { margin: 0; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 99px; }

    /* === Component primitives === */

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 13px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .btn-volt {
      background: var(--volt);
      color: var(--dark);
      padding: 13px 28px;
    }
    .btn-volt:hover {
      background: #B8EE3A;
      transform: translateY(-1px);
    }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1.5px solid var(--border2);
      padding: 12px 24px;
    }
    .btn-outline:hover {
      border-color: var(--volt);
      color: var(--volt);
    }
    .btn-ghost {
      background: transparent;
      color: var(--subtle);
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 600;
    }
    .btn-ghost:hover { color: var(--text); }

    /* Tag pill */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--volt);
      background: rgba(202,255,77,0.08);
      border: 1px solid rgba(202,255,77,0.2);
      padding: 6px 12px;
      border-radius: 6px;
    }
    .tag::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--volt);
      border-radius: 50%;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    .tag.no-dot::before { display: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* Section titles */
    .section-title {
      font-size: clamp(32px, 4vw, 52px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 16px;
    }
    .section-sub {
      font-size: 17px;
      color: var(--subtle);
      line-height: 1.7;
      max-width: 640px;
    }
    .section-header { margin-bottom: 64px; }

    /* Layout container */
    .container {
      max-width: 1120px;
      margin: 0 auto;
      width: 100%;
    }

    /* Logo lockup */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .logo .wordmark {
      font-family: 'DM Sans', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    /* Volt accent text */
    .volt-text { color: var(--volt); }

    /* Fade-up animation base */
    .fade-up {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .fade-up.d1 { transition-delay: 0.1s; }
    .fade-up.d2 { transition-delay: 0.2s; }
    .fade-up.d3 { transition-delay: 0.3s; }
    .fade-up.d4 { transition-delay: 0.4s; }
  </style>
</head>
<body>

  <noscript>
    <style>
      .fade-up { opacity: 1 !important; transform: none !important; }
      [data-wa-msg] { pointer-events: none; opacity: 0.6; }
    </style>
  </noscript>

  <script>
    // populated in later tasks
  </script>
</body>
</html>
